<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신재민 — Crazy Noisy Bizarre Guy</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HERO -->
  <section class="hero" id="top">
    <div class="hero-bg-text">BIZARRE</div>
    <div class="hero-content">
      <p class="hero-tag reveal">— Portfolio · 2026</p>
      <h1 class="hero-title reveal">Crazy<br>Noisy<br>Bizarre<br>Guy</h1>
      <p class="hero-sub reveal">캐딜락처럼 날아서 BMW처럼 쏜다.</p>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="section about" id="about">
    <div class="section-num">01</div>
    <div class="about-inner">
      <h2 class="section-title reveal">About</h2>
      <p class="about-text reveal">
        안녕하세요,<br>
        마포의 젊은이 <strong>신재민</strong>입니다.<br><br>
        잘 부탁드립니다.
      </p>
    </div>

  </section>

  <!-- INFO -->
  <section class="section info" id="info">
    <div class="section-num">02</div>
    <h2 class="section-title reveal">Info</h2>
    <div class="info-grid">
      <div class="info-item reveal">
        <span class="info-label">이름</span>
        <span class="info-value">신재민</span>
      </div>
      <div class="info-item reveal">
        <span class="info-label">생년월일</span>
        <span class="info-value">2006. 03. 02</span>
      </div>
      <div class="info-item reveal">
        <span class="info-label">전공</span>
        <span class="info-value">전기공학과</span>
      </div>
      <div class="info-item reveal">
        <span class="info-label">MBTI</span>
        <span class="info-value">ENFJ</span>
      </div>
    </div>
  </section>

  <!-- PHILOSOPHY -->
  <section class="section philosophy" id="philosophy">
    <div class="section-num">03</div>
    <div class="philosophy-inner">
      <h2 class="section-title reveal">신재민은 길을 찾지 않는다.<br>신재민은 길을 개척한다.</h2>
      <p class="philosophy-text reveal">
        희망이 보이지 않는 시련에도 저는 방법을 찾지 않습니다.<br>
        방법이 없으면 만들면 그만입니다.<br>
        저는 인생에서 정답을 찾지 않고<br>
        <strong>정답을 개척하는 사나이</strong>입니다.
      </p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
